<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web panic!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Courier New', 'Liberation Mono', monospace;
            background-color: #0000aa;
            color: #ffffff;
            font-size: 1.2vw;
            font-weight: bold;
            min-height: 500vh;
            padding: .5em;
        }
        .info {
            justify-self: center;
            display: flex;

            justify-content: center;
            flex-direction: column;
            position: relative;
            margin-top: 4em;
        }

        .qr-code {
            border: 1em solid #ffffff;
            aspect-ratio: 1/1;
            width: 30vw;
            height: 30vw;
            max-width: 50vh;
            max-height: 50vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qr-code img,
        .qr-placeholder {
            box-sizing: border-box;
            aspect-ratio: 1/1;
            width: 30vw;
            height: 30vw;
            max-width: 50vh;
            max-height: 50vh;
            display: flex;
            align-items: center;
            justify-content: center;

        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            align-items: start;
        }
        .message {
            text-align: center;
            margin-top: 1em;
            width: 100%;

        }
        .message p {
            margin: 1em 0;
        }

        pre {
            white-space: pre;
            line-height: 1.1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="ascii-art">
            <pre>
    .--.        _
   |o_o |      | |
   |:_/ |      | |
  //   \ \     |_|
 (|     | )     _
/'\_   _/`\    (_)
\___)=(___/
            </pre>
        </div>

        <div class="info">
            <div class="qr-code">
                <!-- cat Downloads/ezgif-466271eb3e079a31.jpg | qrencode -o binqr.png -l L -v 26 --foreground=0000aa --background=ffffff -8 -m 0
 -->
                <img src="/static/qr.png" alt="QR Code">
            </div>
            <div class="message">
                <p>KERNEL PANIC!</p>
                <p>Please reboot your webpage.</p>
                <p>Fatal exception in http: 404</p>
            </div>
        </div>
    </div>
</body>
</html>
